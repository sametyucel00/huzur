name: iOS Build

on:
  workflow_dispatch:
    inputs:
      profile:
        description: "EAS build profile"
        required: true
        default: "preview"
        type: choice
        options:
          - preview
          - production

jobs:
  ios:
    name: iOS EAS build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm install
        working-directory: .
      - name: Setup EAS
        run: npm install --global eas-cli
      - name: Build iOS
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EXPO_PUBLIC_FIREBASE_API_KEY: ${{ secrets.EXPO_PUBLIC_FIREBASE_API_KEY }}
          EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN }}
          EXPO_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_PROJECT_ID }}
          EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET }}
          EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
          EXPO_PUBLIC_FIREBASE_APP_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_APP_ID }}
          EXPO_PUBLIC_CONTENT_ENV: ${{ vars.EXPO_PUBLIC_CONTENT_ENV || 'production' }}
          EXPO_PUBLIC_PRAYER_PROVIDER: ${{ vars.EXPO_PUBLIC_PRAYER_PROVIDER || 'aladhan' }}
          EXPO_PUBLIC_ALADHAN_BASE_URL: ${{ vars.EXPO_PUBLIC_ALADHAN_BASE_URL || 'https://api.aladhan.com/v1' }}
          EXPO_PUBLIC_ALADHAN_METHOD: ${{ vars.EXPO_PUBLIC_ALADHAN_METHOD || '13' }}
          EXPO_PUBLIC_ALADHAN_SCHOOL: ${{ vars.EXPO_PUBLIC_ALADHAN_SCHOOL || '0' }}
          EXPO_PUBLIC_PURCHASE_PROVIDER: ${{ vars.EXPO_PUBLIC_PURCHASE_PROVIDER || 'store' }}
          EXPO_PUBLIC_SUKUT_PRIVILEGE_MONTHLY_PRODUCT_ID: ${{ vars.EXPO_PUBLIC_SUKUT_PRIVILEGE_MONTHLY_PRODUCT_ID }}
          EXPO_PUBLIC_SUKUT_PRIVILEGE_YEARLY_PRODUCT_ID: ${{ vars.EXPO_PUBLIC_SUKUT_PRIVILEGE_YEARLY_PRODUCT_ID }}
        run: eas build --platform ios --profile "${{ inputs.profile }}" --non-interactive
